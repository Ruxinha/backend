services:
  - type: web
    name: finance-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DB_NAME
        value: finance_tracker
    rootDir: backend
